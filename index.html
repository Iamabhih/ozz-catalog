<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozz Cash and Carry - Sales Catalog</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    
    <!-- Mobile App Icons -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <style>
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
        .loading { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media print {
            /* Chrome's PDF renderer drops -webkit-box display but keeps overflow:hidden,
               making line-clamped text completely invisible. Force a normal block display. */
            .line-clamp-2 {
                display: block !important;
                overflow: visible !important;
                -webkit-line-clamp: unset !important;
                -webkit-box-orient: unset !important;
            }

            /* Allow the product card to show its full text section without clipping.
               Target only cards (rounded-xl + overflow-hidden) not image containers. */
            .rounded-xl.overflow-hidden {
                overflow: visible !important;
            }

            /* Re-apply clipping to the image container (aspect-square) so images
               don't bleed outside their frame. */
            .aspect-square {
                overflow: hidden !important;
            }

            /* Ensure text colours survive PDF rendering */
            .text-gray-900 { color: #111827 !important; }
            .text-gray-800 { color: #1f2937 !important; }

            /* Preserve background and badge colours in PDF */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Hide interactive overlay buttons that shouldn't appear in print */
            button[title="Crop to fill frame"],
            button[title="Show full image"] {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">
            <div class="spinner"></div>
        </div>
    </div>
    
    <script type="text/babel" src="catalog.js"></script>
</body>
</html>
